<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} &mdash; AgentCrew Docs{% else %}AgentCrew Docs{% endif %}</title>
<link rel="stylesheet" href="{{ site.baseurl | default: '' }}/style.css">
</head>
<body>
<nav class="sidebar">
<div class="sidebar-header">
<h2>AgentCrew</h2>
<span class="version">v1.0</span>
</div>
<ul class="nav-list">
  <li{% if page.nav_active == 'index' %} class="active"{% endif %}><a href="{{ site.baseurl | default: '' }}/">Home</a></li>
  <li{% if page.nav_active == 'configuration' %} class="active"{% endif %}><a href="{{ site.baseurl | default: '' }}/configuration/">Configuration</a></li>
  <li{% if page.nav_active == 'objectives' %} class="active"{% endif %}><a href="{{ site.baseurl | default: '' }}/objectives/">Objectives</a></li>
  <li{% if page.nav_active == 'roles' %} class="active"{% endif %}><a href="{{ site.baseurl | default: '' }}/roles/">Roles</a></li>
  <li{% if page.nav_active == 'procedures' %} class="active"{% endif %}><a href="{{ site.baseurl | default: '' }}/procedures/">Procedures</a></li>
  <li{% if page.nav_active == 'debate' %} class="active"{% endif %}><a href="{{ site.baseurl | default: '' }}/debate/">Debate</a></li>
</ul>
</nav>
<main class="content">
{{ content }}
</main>
</body>
</html>
